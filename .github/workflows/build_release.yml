name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Runs the release build which triggers the ABI splits seen in your screenshot
      - name: Build Phone Release APK
        run: ./gradlew :app:assembleRelease

      - name: Build Wear OS Release APK
        run: ./gradlew :wear:assembleRelease

      - name: Upload Phone APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PixelPlay-phone-release-apks
          # The * ensures all files in your screenshot are uploaded
          path: app/build/outputs/apk/release/*.apk

      - name: Upload Wear OS APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PixelPlay-wear-release-apks
          path: wear/build/outputs/apk/release/*.apk
