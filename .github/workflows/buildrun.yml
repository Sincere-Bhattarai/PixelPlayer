name: Release Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

      - name: Build release APK
        run: ./gradlew assembleRelease -PKEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} -PKEY_ALIAS=${{ secrets.KEY_ALIAS }} -PKEY_PASSWORD=${{ secrets.KEY_PASSWORD }}

      - name: Copy release APK
        run: mkdir -p release && cp app/build/outputs/apk/release/app-release.apk release/PixelPlayer.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v3
        with:
          name: PixelPlayer-Release
          path: release/PixelPlayer.apk
